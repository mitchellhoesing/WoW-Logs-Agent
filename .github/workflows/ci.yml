name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff --version
      - run: ruff check src tests --diff
        continue-on-error: true
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -q
